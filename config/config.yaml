paths:
  raw_csv: "data/raw/data_min.csv"
  interim_dir: "data/interim"
  reports_dir: "reports"

data:
  date_start: "2014-11-18"
  date_end: "2014-12-18"
  id_columns: ["user_id", "item_id", "item_category"]

database:
  table_raw: "raw_behavior"
  secrets_file: "config/secrets.yaml"

labeling:
  prediction_dates:
    - "2014-12-06"
    - "2014-12-07"
    - "2014-12-08"
    - "2014-12-09"
    - "2014-12-10"
    - "2014-12-11"
    - "2014-12-12"
    - "2014-12-13"
    - "2014-12-14"
    - "2014-12-15"
    - "2014-12-16"
    - "2014-12-17"
    - "2014-12-18"
  candidate_lookback_days: 3

features:
  count_windows_days: [1, 7, 0]

split:
  test_dates: ["2014-12-18"]
  first_val_date: "2014-12-10"
  negative_ratio: 20
  seed: 48

xgboost:
  negative_ratios: [5, 10, 20, 50] # negative downsampling ratio, tuned as a hyperparameter
  include_full: true # no-downsampling + scale_pos_weight
  seeds: [42, 43] # average downsampled configs over these seeds
  early_stopping_rounds: 30 # early stop on val aucpr
  params:
    max_depth: 6
    learning_rate: 0.1
    n_estimators: 600 # upper bound; early stopping picks the count
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 1